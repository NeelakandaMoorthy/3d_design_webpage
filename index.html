<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fantasy World Portfolio</title>
<style>
html,body{margin:0;height:100%;overflow-x:hidden;background:#030712;color:#fff;font-family:Inter,Arial,sans-serif}
canvas{position:fixed;inset:0;z-index:-1}
.section{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
h1{font-size:min(14vw,10rem);line-height:.9;margin:0}
h2{font-size:min(8vw,4rem)}
.panel{background:rgba(255,255,255,.08);backdrop-filter:blur(14px);padding:2rem;border-radius:24px;max-width:800px}
p{opacity:.85;line-height:1.7}
</style>
</head>
<body>
<div class="section"><div><h1>DREAM<br>WORLD</h1><p>Scroll to travel through a fantasy ecosystem.</p></div></div>
<div class="section"><div class="panel"><h2>Mountains</h2><p>Stylized landscapes inspired by digital paintings.</p></div></div>
<div class="section"><div class="panel"><h2>Creatures</h2><p>Floating lights and dreamlike lifeforms guide the journey.</p></div></div>
<div class="section"><div class="panel"><h2>Portfolio</h2><p>Emotion first. Product second. Exploration always.</p></div></div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js';

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x030712,25,180);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
camera.position.set(0,6,20);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1.2));
const dl=new THREE.DirectionalLight(0xffffff,2);
dl.position.set(10,20,10);
scene.add(dl);

for(let i=0;i<120;i++){
 const m=new THREE.Mesh(
   new THREE.ConeGeometry(3+Math.random()*4,10+Math.random()*12,6),
   new THREE.MeshStandardMaterial({color:new THREE.Color(.2,.4+Math.random()*.4,.7)})
 );
 m.position.set((Math.random()-.5)*120,-6,-Math.random()*260);
 scene.add(m);
}

const stars=new THREE.BufferGeometry();
const arr=new Float32Array(9000);
for(let i=0;i<arr.length;i++) arr[i]=(Math.random()-.5)*300;
stars.setAttribute('position',new THREE.BufferAttribute(arr,3));
scene.add(new THREE.Points(stars,new THREE.PointsMaterial({size:.15})));

const creatures=[];
for(let i=0;i<30;i++){
 let c=new THREE.Mesh(new THREE.SphereGeometry(.3,16,16),
 new THREE.MeshStandardMaterial({emissive:0xffaa66,color:0xffddaa}));
 c.position.set((Math.random()-.5)*80,Math.random()*20,-Math.random()*200);
 scene.add(c); creatures.push(c);
}

addEventListener('resize',()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});

function animate(){
 requestAnimationFrame(animate);
 const s=scrollY||0;
 camera.position.z=20-s*0.02;
 camera.position.y=6+s*0.004;

 creatures.forEach((c,i)=>{
  c.position.x+=Math.sin(Date.now()*0.001+i)*0.01;
  c.position.y+=Math.cos(Date.now()*0.0015+i)*0.01;
 });

 renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
